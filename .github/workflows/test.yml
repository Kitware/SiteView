name: CI

on:
  push:
    branches: [master, release]
  pull_request:
    branches: [master, release]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v6
        with:
          auto-update-conda: true
          activate-environment: siteview
          environment-file: siteview-env.yml # optional (see below)
          channel-priority: strict

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
        shell: bash -l {0}

      - name: Run help command
        run: |
          python -m e3sm_siteview.app --help
        shell: bash -l {0}
